<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>E-Store | Onlayn Do'kon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">🛒 E-Store</a>

            <form class="d-flex text-end" method="GET" action="{% url 'home' %}">
                <input class="form-control me-2" type="search" name="q" placeholder="Mahsulot qidirish..." value="{{ query|default:'' }}">
                <button class="btn btn-outline-light" type="submit">Qidirish</button>
            </form>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="bg-light text-center text-lg-start mt-5 py-3 border-top">
        <div class="text-center p-3">
            © 2026 E-Store. Barcha huquqlar himoyalangan.
        </div>
    </footer>

</body>
</html>
